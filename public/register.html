<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Canteen Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/funky.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-school fa-3x mb-3"></i>
        <h4>🏫 Institution Registration</h4>
        <p class="mb-0">Join our canteen management platform!</p>
      </div>
      <div class="login-body">
        <form action="/register" method="POST">
          <div class="mb-4">
            <label for="name" class="form-label fw-bold">
              <i class="fas fa-building me-2"></i>Institution Name
            </label>
            <input type="text" class="form-control form-control-lg" id="name" name="name" required placeholder="Enter institution name">
          </div>
          <div class="mb-4">
            <label for="email" class="form-label fw-bold">
              <i class="fas fa-envelope me-2"></i>Email Address
            </label>
            <input type="email" class="form-control form-control-lg" id="email" name="email" required placeholder="Enter email address">
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-bold">
              <i class="fas fa-lock me-2"></i>Password
            </label>
            <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="Create a password">
          </div>
          <button type="submit" class="btn btn-success w-100 btn-lg mb-3">
            <i class="fas fa-rocket me-2"></i>Create Institution Account
          </button>
        </form>
        <div class="text-center">
          <a href="/" class="text-decoration-none">
            <i class="fas fa-arrow-left me-1"></i>Already have an account? <strong>Login here</strong>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
