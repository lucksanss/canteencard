<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Canteen Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/funky.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-utensils fa-3x mb-3"></i>
        <h4>🍽️ Canteen Card Login</h4>
        <p class="mb-0">Welcome back to your canteen management system!</p>
      </div>
      <div class="login-body">
        <form action="/login" method="POST">
          <div class="mb-4">
            <label for="email" class="form-label fw-bold">
              <i class="fas fa-envelope me-2"></i>Email Address
            </label>
            <input type="email" class="form-control form-control-lg" id="email" name="email" required placeholder="Enter your email">
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-bold">
              <i class="fas fa-lock me-2"></i>Password
            </label>
            <input type="password" class="form-control form-control-lg" id="password" name="password" required placeholder="Enter your password">
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">
            <i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard
          </button>
        </form>
        <div class="text-center">
          <a href="/register" class="text-decoration-none">
            <i class="fas fa-user-plus me-1"></i>Don't have an account? <strong>Register your institution</strong>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
